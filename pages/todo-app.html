<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="../css/todo-app.css">
    <link rel="stylesheet" href="../css/utility.css">
</head>

<body>
    <header class="header" style="grid-area: header;">
        <div class="header__back-icon">
            <a href="../index.html">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                    <path d="M640-80 240-480l400-400 71 71-329 329 329 329-71 71Z" />
                </svg>
            </a>
        </div>
        <h1 class="header__heading"><span>todo</span> <span>app</span></h1>
        <div class="header__save" onclick="addNewTodo()">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                <path d="M840-680v480q0 33-23.5 56.5T760-120H200q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h480l160 160Zm-80 34L646-760H200v560h560v-446ZM565-275q35-35 35-85t-35-85q-35-35-85-35t-85 35q-35 35-35 85t35 85q35 35 85 35t85-35ZM240-560h360v-160H240v160Zm-40-86v446-560 114Z" />
            </svg>
        </div>
        <div class="header__dark-mode">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                <path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z" />
            </svg>
        </div>
    </header>
    <aside class="aside" style="grid-area: aside;">
        <textarea class="aside__texteditor-head" placeholder="Title"></textarea>
        <textarea class="aside__texteditor-body" placeholder="Make todo"></textarea>
    </aside>
    <main class="main" style="grid-area: main;">
        <div class="main__create-btn main__todo-item main__todo-item--create" onclick="openTextEditor()">
            <!-- <h2>Title</h2> -->
            <!-- <p>this is a paragraph inside todo item preview</p> -->
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                <path d="M440-120v-320H120v-80h320v-320h80v320h320v80H520v320h-80Z" />
            </svg>
            <span>create</span>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <script type="text/javascript" src="../script/todo-app.js"></script>
</body>

</html>
